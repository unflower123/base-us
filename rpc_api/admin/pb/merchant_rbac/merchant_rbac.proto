syntax = "proto3";

option go_package = "base/rpc_api/admin/pb/merchant_rbac";

package pb;

message GetMenusByTreeReq {
  uint64 id = 1;
  uint64 parent_id = 2;
}

message GetUserMenusReq {
  uint64 role_id = 1;
}

message MenuItem {
  uint64 id = 1;
  uint64 parent_id = 2;
  string name = 3;
  string path = 4;
  string component = 5;
  string route_name = 6;
  string route_path = 7;
  string method = 8;
  int64 order_num = 9;
  int32 type = 10;
  int32 status = 11;
  string icon = 12;
  repeated MenuItem children = 13;
}


message GetMenusByTreeResp {
  repeated MenuItem tree = 1;
}

message GetUserMenusResp {
  repeated MenuItem tree = 1;
}


service MerchantRbac {
  rpc GetMenusByTree(GetMenusByTreeReq) returns (GetMenusByTreeResp);
  rpc GetUserMenus(GetUserMenusReq) returns (GetUserMenusResp);
}