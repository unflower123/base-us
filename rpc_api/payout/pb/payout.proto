message GetPayoutDispatchTaskReq {
  int64 id = 1;
  string task_id = 2;
  int64 channel_id = 3;
  string channel_name = 4;
  string operator_user = 5;
  int32 task_status = 6;
  int32 time_type = 7;
  string start_time = 8;
  string end_time = 9;
  int64 page = 10;
  int64 size = 11;
}

message GetPayoutDispatchTaskResp {
  repeated PayoutDispatchTaskInfo list = 1;
  int64 total = 2;
}

message PayoutDispatchTaskInfo {
  // 主键 (Primary Key)
  int64 id = 1; // 记录 ID

  // 任务核心信息 (Task Core Information)
  string task_id = 2;              // 任务 ID
  string task_date = 3;            // 任务所属日期 (String 类型)
  int32 task_sequence = 4;         // 任务序列号

  int64 channel_id = 5;           // 渠道 ID
  string channel_name = 6;         // 渠道名称
  string operator_user = 7;        // 操作用户
  string currency = 8;             // 币种
  int32 channel_concurrency = 9;   // 渠道并发数

  // 订单和进度 (Order and Progress)
  int32 requested_count = 10;       // 请求订单数
  int32 actual_count = 11;          // 实际完成订单数
  int32 duplicate_count = 12;       // 重复请求次数

  int32 task_progress = 13;         // 任务进度

  // 状态和时间 (Status and Time)
  int32 task_status = 14;           // 任务完成状态 (int32 类型，例如 2处理中，1已完成) ⚠️ 已修改
  int64 estimated_finish_time = 15; // 预计完成时间，单位秒 (Unix 时间戳)

  // 数据记录 (Data Payload)
  string requested_data = 16;       // 原始请求数据
  string actual_data = 17;          // 实际处理结果数据
  string duplicate_data = 18;       // 重复请求时提交的数据
  string duplicate_task_id = 19;    // 重复请求数据对应的任务id

  // 时间戳 (Timestamps)
  string finish_time = 20;         // 任务实际完成时间 (String 类型)
  string create_time = 21;        // 任务创建时间 (String 类型)
  string update_time = 22;        // 任务更新时间 (String 类型)

  int32 failed_count = 23;       // 失败次数
  string failed_data = 24;       // 失败的数据
}

message GetRiskControlRuleReq {
}

message GetRiskControlRuleResp {
  repeated RiskControlRuleInfo list = 1;
}

message RiskControlRuleInfo {
  int32 time_days = 1;
  repeated RiskControlRule list = 2;
}

message UpdateRiskControlRuleReq {
  repeated RiskControlRuleInfo list = 1;
}
message UpdateRiskControlRuleResp {
  string msg = 1;
}

message RiskControlRule {
  int64 id = 1;                     // 主键ID (BIGSERIAL)
  string rule_id = 2;               // 规则的业务唯一标识 (UNIQUE)

  int64 min_amount = 3;             // 金额区间起始值 (最小货币单位)
  int64 max_amount = 4;             // 金额区间结束值 (最小货币单位)
  int32 limit_count = 5;            // 该金额区间允许的最大操作次数 (int -> int32)

  string rule_type = 6;             // 规则的应用类型 (e.g., USER_DAILY_TXN)
  int32 time_days = 7;              // 限流时间窗口长度 (天数: 1, 3, 7)

  int64 merchant_id = 8;            // 商户id字段
  string risk_account = 9;          // 风控账号
  string rule_desc = 10;            // 规则描述
  int32 is_active = 11;             // 规则启用状态 (1: 启用, 2: 禁用)
  string currency = 12;             // 币种

  string create_time = 13; // 创建时间
  string update_time = 14; // 更新时间
}

message GetPayoutAccountSummaryReq {
  string withdraw_account = 2; // 账号ID (提现或交易账号)
  string rule_id = 3;          // 命中的风控规则ID
  int32 time_days = 4;         // 限流时间窗口长度 (天数: 1, 7)
  int64 page = 5;
  int64 size = 6;
}


message GetPayoutAccountSummaryResp {
  int64 total = 1;
  repeated PayoutAccountSummaryInfo list = 2;

}

message PayoutAccountSummaryInfo {
  int64 id = 1; // 主键ID

  string withdraw_account = 2; // 账号ID (提现或交易账号)
  string rule_id = 3;          // 命中的风控规则ID
  int32 time_days = 4;         // 限流时间窗口长度 (天数: 1, 7)
  string stat_date = 5;        // 统计的日期 (格式: YYYY-MM-DD)

  int32 total_count = 6;  // 当日累计尝试下单总数
  int32 limit_count = 7;  // 当日累计被限流的数量
  int64 total_amount = 8; // 当日累计下单金额 (尝试下单总金额)
  int64 limit_amount = 9; // 当日累计被限流的金额
  string currency = 10;   // 币种

  int32 start_limit_count = 11; // 解限重算起点。管理员操作时的 total_count 快照
  string last_clear_time = 12;  // 最近一次管理员解除限制操作的时间 (格式: ISO 8601 字符串)
  string data_date = 13;        // 数据日期time_days不为1的时候记

  string create_time = 14; // 记录创建时间 (格式: ISO 8601 字符串)
  string update_time = 15; // 记录更新时间 (格式: ISO 8601 字符串)

}
// ==================== 查询出金状态 ====================
message PayoutStatusRequest {
  string merchant_id = 1;       // 商户ID
  string merchant_txn_id = 2;   // 商户交易ID
  string sign = 3;              // 签名
}

message PayoutStatusResponse {
  string opt_status = 1;        // 操作状态 (SUCCESS，FAILED)
  string txn_status = 2;        // 交易状态 (SUCCESS，PENDING，FAILED，REFUND)
  string message = 3;           // 响应消息
  PayoutStatusData data = 4;    // 数据
  string sign = 5;              // 签名
}

message PayoutStatusData {
  string txn_status = 1;        // 交易状态
  string resp_desc = 2;         // 请求描述
  string merchant_id = 3;       // 商户ID
  string merchant_txn_id = 4;   // 商户交易ID
  string txn_id = 5;            // 平台交易ID
  float request_amount = 6;     // 请求金额
  float pay_amount = 7;         // 交易金额
  string bank_txn_id = 8;       // 银行交易ID
  string account_type = 9;      // 账户类型
  string bank_name = 10;        // 银行名称
  string bank_code = 11;        // 银行编码
  string first_name = 12;       // 名字
  string last_name = 13;        // 姓氏
  string birthday = 14;         // 出生日期
  string account = 15;          // 账户号
  string account_expire = 16;   // 收款账户的有效期
  string phone = 17;            // 手机号码
  string email = 18;            // 邮箱
  string country = 19;          // 国家代码
  string request_time = 20;     // 请求时间
  string pay_time = 21;         // 支付时间
  string notify_time = 22;      // 通知时间
}

// ==================== 查询出金余额 ====================
message PayoutBalanceRequest {
  string merchant_id = 1;       // 商户ID
  string timestamp = 2;         // 请求时间戳
  string sign = 3;              // 签名
}

message PayoutBalanceResponse {
  string opt_status = 1;        // 操作状态 (SUCCESS，FAILED)
  string message = 2;           // 响应消息
  float all_balance = 3;        // 总金额
  float usable_balance = 4;     // 可用金额
  float blocked_balance = 5;    // 锁定金额
  float unsettled_balance = 6;   // 未结算金额
}

// ==================== 退款提交（商户接口）====================
message RefundSubmitRequest {
  string merchant_id = 1;       // 商户ID
  string merchant_txn_id = 2;   // 商户订单ID
  string payment_code = 3;      // 支付类型
  string currency = 4;          // 国家代码
  float amount = 5;             // 金额（精确到小数点后2位）
  int64 timestamp = 6;          // 请求时间戳（精确到毫秒）
  string reason = 7;            // 请求原因
  string notify_url = 8;        // 通知接口
  string sign = 9;              // 签名
}

message RefundSubmitResponse {
  string opt_status = 1;        // 操作状态 (SUCCESS，FAILED)
  string message = 2;           // 操作信息
  string merchant_txn_id = 3;   // 商户交易ID
  string txn_id = 4;            // 平台交易ID
  string refund_txn_id = 5;     // 退款交易ID
  float refund_amount = 6;      // 退款金额
  float remaining_amount = 7;   // 可退款金额
  string refund_status = 8;     // 退款状态 (SUCCESS，PENDING，FAILED，REFUND)
  string sign = 9;              // 签名
}

// ==================== 查询退款状态 ====================
message RefundStatusRequest {
  string merchant_id = 1;       // 商户ID
  string merchant_txn_id = 2;   // 商户交易ID
  string sign = 3;              // 签名
}

message RefundStatusResponse {
  string opt_status = 1;        // 操作状态 (SUCCESS，FAILED)
  string txn_status = 2;        // 交易状态 (SUCCESS，PENDING，FAILED，REFUND)
  string message = 3;           // 响应消息
  RefundStatusData data = 4;    // 数据
  string sign = 5;              // 签名
}

message RefundStatusData {
  string merchant_txn_id = 1;   // 商户交易ID
  string txn_id = 2;            // 平台交易ID
  string refund_txn_id = 3;     // 退款申请ID
  float refund_amount = 4;      // 退款金额
  float remaining_amount = 5;   // 可退款金额
  string refund_status = 6;     // 退款状态
  string refund_msg = 7;        // 退款消息，如果失败会告知失败消息
}


message GetPayoutAlarmOrderReq {

  // 1. 过滤条件
  string withdraw_account = 1;   // 提款账号
  int64 merchant_id = 2;         // 商户ID
  string order_no = 3;           // 订单号
  string merchant_order_no = 4;  // 商户订单号
  int32 alert_rule_type = 5;     // 告警类型
  string operator_user = 6;      // 操作用户

  // 2. 分页信息
  int64 page = 7;                // 当前页码 (用于分页查询)
  int64 size = 8;                // 每页大小 (用于分页查询)

}

message GetPayoutAlarmOrderResp{
  repeated PayoutAlarmOrderInfo list = 1;
  int64 total = 2;
}

message PayoutAlarmOrderInfo {
  // 1. 基础字段和主键
  int64 id = 1; // 主键ID

  // 2. 业务维度字段
  string withdraw_account = 2;   // 提款账号
  int64 merchant_id = 3;         // 商户ID
  string order_no = 4;           // 订单号 (唯一)
  string merchant_order_no = 5;  // 商户订单号 (唯一)
  int64 amount = 6;              // 提款金额 (最小单位)
  string currency = 7;           // 币种

  // 3. 告警信息
  int32 alert_rule_type = 8;     // 告警类型
  string alert_rule_id = 9;      // 告警规则ID
  int32 alert_status = 10;       // 告警状态 1:解除，2:不处理 ,3:告警中
  string alert_reason = 11;      // 告警原因或详细描述

  // 4. 操作和时间字段
  string operator_user = 12;                                  // 操作用户
  string operation_time = 13;              // 最近一次处理或操作告警的时间
  string create_time = 14;                 // 告警记录创建时间
  string update_time = 15;                 // 记录更新时间
}

message PayoutAlarmOrderReleaseReq {

}
message PayoutAlarmOrderReleaseResp {
}

// ------------------------------------
// Rpc Func
// ------------------------------------

service Payout {
  // create payout order
  rpc Create(CreatePayoutOrderReq) returns (CreatePayoutOrderResp);
  // get payout order list
  rpc GetList(GetPayoutOrderListReq) returns (GetPayoutOrderListResp);
  // payuot order callback
  rpc Callback(CallbackPayoutOrderReq) returns (CallbackPayoutOrderResp);
  //get order info detail
  rpc GetMerchantOrderInfo(GetPayoutOrderInfoReq) returns (GetPayoutOrderInfoResp);
  // notify merchant success
  rpc NotifySuccess(PayoutNotifySuccessReq) returns (PayoutNotifySuccessResp);
  rpc GetPayoutOrderListCumulativeSummary(GetPayoutOrderListReq) returns (PayoutOrderListCumulativeSummaryResponse);
  rpc BatchUpdateRefundPayoutOrder(BatchUpdateRefundPayoutOrderParam) returns (BatchUpdatePayoutOrderResponse);
  rpc GetPayoutOrderStatisticsData(GetPayoutOrderStatisticsDataReq) returns (GetPayoutOrderStatisticsDataResp);
  // query payout order info
  rpc QueryOrderInfo(QueryOrderInfoReq) returns (QueryOrderInfoResp);

  rpc QueryMerchantBalance(QueryMerchantBalanceReq) returns (QueryMerchantBalanceResp);
  rpc QueryOrderLog(QueryPayoutOrderLogReq) returns (QueryPayoutOrderLogResp);
  rpc ManualPayoutOrder(ManualPayoutOrderReq) returns (ManualPayoutOrderResp);
  rpc DispatchOrder(DispatchOrderReq) returns (DispatchOrderResp);
  rpc ResetReleaseCount(ResetReleaseCountReq) returns (ManualPayoutOrderResp);
  rpc GetMerchantByOrder(GetMerchantByOrderReq) returns (GetMerchantByOrderResp);
  rpc GetPayoutDispatchTask(GetPayoutDispatchTaskReq) returns (GetPayoutDispatchTaskResp);

  // risk control
  rpc GetRiskControlRule(GetRiskControlRuleReq) returns (GetRiskControlRuleResp);
  rpc UpdateRiskControlRule(UpdateRiskControlRuleReq) returns (UpdateRiskControlRuleResp);

  rpc GetPayoutAccountSummary(GetPayoutAccountSummaryReq) returns (GetPayoutAccountSummaryResp);

  rpc GetPayoutAlarmOrder(GetPayoutAlarmOrderReq) returns (GetPayoutAlarmOrderResp);
  rpc PayoutAlarmOrderRelease(PayoutAlarmOrderReleaseReq) returns (PayoutAlarmOrderReleaseResp);

  // 查询出金状态 - 对应 /payment/payout/status
  rpc GetPayoutStatus(PayoutStatusRequest) returns (PayoutStatusResponse);
  // 查询出金余额 - 对应 /payment/payout/balance
  rpc GetPayoutBalance(PayoutBalanceRequest) returns (PayoutBalanceResponse);
}


