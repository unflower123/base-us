syntax = "proto3";

option go_package = "base/rpc_api/payout/pb";

package pb;

message CreatePayoutOrderReq {
  string merchant_id = 1;       // 商户ID
  string merchant_txn_id = 2;   // 商户订单ID
  string payment_code = 3;      // 支付类型
  float amount = 4;             // 金额
  int64 timestamp = 5;          // 请求时间戳（毫秒）
  string currency = 6;          // 货币类型
  string notify_url = 7;        // 通知URL
  string account_type = 8;      // 账户类型
  string bank_name = 9;         // 银行名称
  string bank_code = 10;        // 银行编码
  string first_name = 11;       // 户主名字
  string last_name = 12;        // 户主姓氏
  string birthday = 13;         // 户主生日
  string account = 14;          // 户主银行账户
  string account_expire = 15;   // 收款账户的有效期
  string phone = 16;            // 户主手机
  string email = 17;            // 户主邮箱
  string country = 18;          // 国家代码
  string state = 19;            // 州
  string city = 20;             // 城市
  string zip_code = 21;         // 邮编
  string address1 = 22;         // 地址行1
  string address2 = 23;         // 地址行2
  string address3 = 24;         // 地址行3
  string sign = 25;             // 签名
}


message CreatePayoutOrderResp {
  string opt_status = 1;        // 操作状态 (SUCCESS，FAILED)
  string message = 2;           // 操作信息
  string merchant_txn_id = 3;   // 交易ID
  float amount = 4;             // 交易金额
  string txn_id = 5;            // 交易ID
  string txn_status = 6;        // 交易状态 (SUCCESS，PENDING，FAILED，REFUND)
  float fee_amount = 7;         // 手续费
  string request_time = 8;      // 请求时间
  string sign = 9;              // 签名
}

message CallbackPayoutOrderReq {
  // system order no required, request bank in system order no
  string system_order_no = 1;
  // bank order no required, bank order no required
  string bank_order_no = 2;
  // transaction amount required, acoumt point unit
  double transaction_amount = 3;
  // time format Milliseconds required
  string  bank_time = 4;
  // bank callback msg info
  string bank_msg = 5;
  // 1:success、2:failed、3:processing required, bank return processing result status
  int64  bank_status = 6;
  // transaction currency type
  string currency = 7;
  // transaction  remark info
  string remark = 8;
  // bank callback code
  string bank_code = 9;
  // bank callback utr
  string bank_utr = 10;
  // 银行原始响应
  string bank_callback = 11;
}
message CallbackPayoutOrderResp {
  // 1:success，2/0:failed
  int64 code = 1;
  // response message
  string msg = 2;
}

