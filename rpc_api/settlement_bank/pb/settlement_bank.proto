syntax = "proto3";

option go_package = "base/rpc_api/settlement_bank/pb";

package pb;

message GetBankInfoReq {
  int64 page = 1;
  int64 size = 2;
}

message GetBankInfoResp {
  int64 total = 1;
  repeated BankInfo list = 2;
}

message BankInfo {
  int64  id = 1;
  string bank_account = 2;
  string bank_name = 3;
  string bank_identifier = 4;
  string bank_mobile_phone = 5;
  int32  bank_status = 6;
  string currency = 7;
  string remark = 8;
  int64  create_time = 9;
}

message SettlementOperateResp {
  string msg = 1;
}


// ------------------------------------
// Rpc Func
// ------------------------------------

service SettlementBank {
  // create settlement bank info
  rpc CreateBankInfo(BankInfo) returns (SettlementOperateResp);
  // modify settlement bank info
  rpc ModifyBankInfo(BankInfo) returns (SettlementOperateResp);
  // delete settlement bank info
  rpc DeleteBankInfo(BankInfo) returns (SettlementOperateResp);
  // modify settlement bank status
  rpc ModifyBankStatus(BankInfo) returns (SettlementOperateResp);
  // get settlement bank info
  rpc GetBankList(GetBankInfoReq) returns (GetBankInfoResp);

}