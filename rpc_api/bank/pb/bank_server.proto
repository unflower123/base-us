syntax = "proto3";

option go_package = "./;bank";

package protobuf;

service bank {
  rpc PayinCallBank(PayinRequest) returns (PayinResponse) {}
  rpc PayinCheckOrder(CheckOrderRequest) returns (CheckOrderResponse) {}
  rpc PayoutCallBank(PayoutRequest) returns (PayoutResponse) {}
  rpc PayoutCheckOrder(CheckOrderRequest) returns (CheckOrderResponse) {}
  rpc CheckBalance(CheckBalanceReq) returns (CheckBalanceResp) {}
}
